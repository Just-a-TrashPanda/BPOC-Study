<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flashcards — BPOC Study Reference</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F3EFE4; --paper-dim:#EAE4D3; --ink:#221F19; --ink-soft:#5B564A;
    --navy:#132339; --navy-2:#1C3552; --brass:#B08B3C; --brass-light:#D7B667; --rule:#C9BF9F;
    --green:#4B6A50; --amber:#9B7E32; --gray:#8B8674; --rust:#A6472E;
  }
  *{box-sizing:border-box;}
  body{margin:0; background:var(--paper); color:var(--ink); font-family:'IBM Plex Sans', sans-serif; -webkit-font-smoothing:antialiased;}

  header.hero{background:linear-gradient(180deg, var(--navy) 0%, var(--navy-2) 100%); color:#EDE7D6; padding:26px 20px 20px; position:relative; overflow:hidden;}
  header.hero::after{content:""; position:absolute; inset:0; background-image:repeating-linear-gradient(135deg, rgba(215,182,103,0.05) 0 2px, transparent 2px 26px); pointer-events:none;}
  .hero-top{display:flex; justify-content:space-between; align-items:flex-start; gap:12px; flex-wrap:wrap;}
  .hero-eyebrow{font-family:'IBM Plex Mono', monospace; font-size:11px; letter-spacing:0.14em; text-transform:uppercase; color:var(--brass-light); margin:0 0 6px;}
  .hero h1{font-family:'IBM Plex Serif', serif; font-weight:700; font-size:22px; line-height:1.15; margin:0;}
  .back{font-size:12px; color:var(--brass-light); text-decoration:none; font-family:'IBM Plex Mono', monospace; white-space:nowrap;}

  nav.chips{position:sticky; top:0; z-index:20; background:var(--paper); border-bottom:1px solid var(--rule); padding:9px 12px; display:flex; gap:6px; overflow-x:auto; -webkit-overflow-scrolling:touch;}
  nav.chips::-webkit-scrollbar{display:none;}
  .chip{flex:none; font-family:'IBM Plex Sans', sans-serif; font-size:12px; font-weight:600; padding:6px 12px; border-radius:999px; border:1px solid var(--rule); background:#fff; color:var(--ink-soft); cursor:pointer; white-space:nowrap; transition:all 0.15s ease;}
  .chip.active{background:var(--navy); border-color:var(--navy); color:#F3EFE4;}
  .chip.disabled{opacity:0.4; cursor:default;}

  main{max-width:560px; margin:0 auto; padding:22px 16px 60px;}

  .deck-status{display:flex; justify-content:space-between; align-items:center; font-family:'IBM Plex Mono', monospace; font-size:11.5px; color:var(--ink-soft); margin-bottom:14px;}
  .progress-track{flex:1; height:6px; border-radius:999px; background:var(--paper-dim); margin:0 12px; overflow:hidden;}
  .progress-fill{height:100%; background:var(--brass); width:0%; transition:width 0.2s ease;}

  .card-scene{perspective:1400px; margin-bottom:18px;}
  .flashcard{
    position:relative; width:100%; min-height:200px; border-radius:14px;
    transform-style:preserve-3d; transition:transform 0.5s cubic-bezier(.4,.2,.2,1), height 0.25s ease;
    cursor:pointer;
  }
  .flashcard.flipped{transform:rotateY(180deg);}
  .face{
    position:absolute; inset:0; width:100%; max-width:100%; backface-visibility:hidden; border-radius:14px;
    padding:24px 20px; box-shadow:0 4px 18px rgba(19,35,57,0.14); border:1px solid var(--rule);
    overflow-wrap:break-word; word-break:break-word; white-space:normal;
  }
  .face-inner{min-height:100%; width:100%; max-width:100%; display:flex; flex-direction:column; justify-content:center; min-width:0;}
  .face.front{background:#fff;}
  .face.back{background:var(--navy); color:#EDE7D6; transform:rotateY(180deg);}
  .face-eyebrow{font-family:'IBM Plex Mono', monospace; font-size:10px; text-transform:uppercase; letter-spacing:0.08em; color:var(--brass); margin-bottom:10px; text-align:center; flex:none; min-width:0;}
  .face.back .face-eyebrow{color:var(--brass-light);}
  .face-term{font-family:'IBM Plex Serif', serif; font-weight:600; font-size:19px; text-align:center; line-height:1.35; flex:none; min-width:0; white-space:normal;}
  .face-cite{font-family:'IBM Plex Mono', monospace; font-size:11.5px; color:var(--ink-soft); text-align:center; margin-top:8px; flex:none; min-width:0;}
  .face-body{font-size:13.5px; line-height:1.6; margin-top:6px; min-width:0; white-space:normal; width:100%;}
  .face-body ul{margin:6px 0 0; padding-left:18px;}
  .face-hint{text-align:center; font-family:'IBM Plex Mono',monospace; font-size:9.5px; color:var(--ink-soft); opacity:0.6; margin-top:14px; flex:none; min-width:0;}
  .face.back .face-hint{color:#B9C2CE;}

  .controls{display:flex; gap:8px; margin-bottom:10px;}
  .btn{flex:1; padding:11px 10px; border-radius:8px; border:1px solid var(--rule); background:#fff; color:var(--ink); font-family:'IBM Plex Sans',sans-serif; font-size:13px; font-weight:600; cursor:pointer; text-align:center;}
  .btn:active{transform:scale(0.98);}
  .btn.nav{flex:0 0 44px; font-size:16px;}
  .btn.know{border-color:var(--green); color:var(--green);}
  .btn.know:hover{background:var(--green); color:#fff;}
  .btn.learning{border-color:var(--amber); color:var(--amber);}
  .btn.learning:hover{background:var(--amber); color:#fff;}

  .util-row{display:flex; gap:8px; margin-top:14px;}
  .util-btn{flex:1; padding:9px; border-radius:8px; border:1px dashed var(--rule); background:transparent; color:var(--ink-soft); font-family:'IBM Plex Mono',monospace; font-size:11px; cursor:pointer;}
  .util-btn:hover{border-style:solid; color:var(--ink);}

  .empty-state, .done-state{background:#fff; border:1px dashed var(--rule); border-radius:10px; padding:40px 20px; text-align:center;}
  .empty-state h3, .done-state h3{font-family:'IBM Plex Serif',serif; font-size:17px; margin:0 0 8px;}
  .empty-state p, .done-state p{font-size:13px; color:var(--ink-soft); line-height:1.6; max-width:38ch; margin:0 auto;}

  .stat-pill{font-size:10.5px; font-family:'IBM Plex Mono',monospace; padding:2px 8px; border-radius:4px; font-weight:600;}
  .stat-pill.know{background:rgba(75,106,80,0.12); color:var(--green);}
  .stat-pill.learning{background:rgba(155,126,50,0.12); color:var(--amber);}

  footer{text-align:center; padding:26px 14px 12px; font-size:11px; color:var(--ink-soft);}

  @media (min-width:600px){ .hero h1{font-size:26px;} }
</style>
</head>
<body>

<header class="hero">
  <div class="hero-top">
    <div>
      <p class="hero-eyebrow">Fort Worth PD Academy · BPOC Flashcards</p>
      <h1>Flip &amp; Test</h1>
    </div>
    <a class="back" href="index.html">&larr; Hub</a>
  </div>
</header>

<nav class="chips" id="chapterChips"></nav>

<main id="main"></main>

<footer>Auto-generated from the Chapter &amp; Topic Reference — same source material, quiz format · Built for study purposes by and for the FWPD Academy class</footer>

<script src="assets/chapters-data.js"></script>
<script>
/* ===================== FLASHCARD ENGINE ===================== */

// Only chapters listed here are offered as flashcard decks. Add a chapter's
// number here once you're ready to expand — no other code changes needed.
const FLASHCARD_ENABLED_CHAPTERS = [1, 2];

let deck = [];          // full ordered deck for the current chapter
let queue = [];         // remaining indices to review this session
let missed = [];        // indices marked "still learning" this pass
let knowCount = 0;
let learningCount = 0;
let currentIdx = null;
let isFlipped = false;
let activeChapterNum = null;

function buildDeckForChapter(chNum){
  const ch = chapters.find(c => c.num === chNum);
  const cards = [];
  if(ch && ch.topics){
    ch.topics.forEach(topic => {
      topic.cards.forEach(c => {
        // Strip HTML tags for the front/back text so the flip card reads cleanly
        const cleanBody = c.body ? c.body.replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim() : '';
        cards.push({
          front: c.title.replace(/<[^>]+>/g,''),
          cite: c.cite || '',
          back: cleanBody,
          note: c.note ? c.note.replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim() : '',
          topicLabel: topic.label
        });
      });
    });
  }
  return cards;
}

function shuffle(arr){
  const a = arr.slice();
  for(let i = a.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function renderChapterChips(){
  const wrap = document.getElementById('chapterChips');
  wrap.innerHTML = '';
  const liveChapters = chapters.filter(c => c.status === 'live');
  liveChapters.forEach(ch => {
    const enabled = FLASHCARD_ENABLED_CHAPTERS.includes(ch.num);
    const b = document.createElement('button');
    b.className = 'chip' + (ch.num === activeChapterNum ? ' active' : '') + (enabled ? '' : ' disabled');
    b.textContent = 'Ch ' + ch.num;
    b.title = enabled ? ch.title : ch.title + ' (flashcards coming soon)';
    if(enabled){
      b.onclick = () => { startChapter(ch.num); };
    }
    wrap.appendChild(b);
  });
}

function startChapter(chNum){
  activeChapterNum = chNum;
  deck = shuffle(buildDeckForChapter(chNum));
  queue = deck.map((_, i) => i);
  missed = [];
  knowCount = 0;
  learningCount = 0;
  renderChapterChips();
  nextCard();
}

function nextCard(){
  isFlipped = false;
  if(queue.length === 0){
    if(missed.length > 0){
      queue = shuffle(missed);
      missed = [];
    } else {
      renderDone();
      return;
    }
  }
  currentIdx = queue.shift();
  renderCard();
}

function markCard(known){
  if(known){ knowCount++; } else { learningCount++; missed.push(currentIdx); }
  nextCard();
}

function renderCard(){
  const main = document.getElementById('main');
  const card = deck[currentIdx];
  const total = deck.length;
  const seen = knowCount + learningCount + 1;

  main.innerHTML = `
    <div class="deck-status">
      <span class="stat-pill know">${knowCount} know</span>
      <div class="progress-track"><div class="progress-fill" style="width:${Math.min(100, Math.round((seen-1)/total*100))}%"></div></div>
      <span class="stat-pill learning">${learningCount} learning</span>
    </div>
    <div class="card-scene">
      <div class="flashcard" id="flashcard">
        <div class="face front">
          <div class="face-inner">
            <div class="face-eyebrow">${card.topicLabel}</div>
            <div class="face-term">${card.front}</div>
            ${card.cite ? `<div class="face-cite">${card.cite}</div>` : ''}
            <div class="face-hint">Tap to flip</div>
          </div>
        </div>
        <div class="face back">
          <div class="face-inner">
            <div class="face-eyebrow">Answer</div>
            <div class="face-body">${card.back}</div>
            ${card.note ? `<div class="face-body" style="margin-top:10px;font-style:italic;opacity:0.9;">${card.note}</div>` : ''}
            <div class="face-hint">Tap to flip back</div>
          </div>
        </div>
      </div>
    </div>
    <div class="controls">
      <button class="btn learning" id="learningBtn">Still Learning</button>
      <button class="btn know" id="knowBtn">Know It</button>
    </div>
    <div class="util-row">
      <button class="util-btn" id="shuffleBtn">&#8635; Reshuffle Deck</button>
      <button class="util-btn" id="restartBtn">Restart Chapter</button>
    </div>
  `;

  document.getElementById('flashcard').onclick = () => {
    isFlipped = !isFlipped;
    document.getElementById('flashcard').classList.toggle('flipped', isFlipped);
  };
  document.getElementById('knowBtn').onclick = (e) => { e.stopPropagation(); markCard(true); };
  document.getElementById('learningBtn').onclick = (e) => { e.stopPropagation(); markCard(false); };
  document.getElementById('shuffleBtn').onclick = (e) => { e.stopPropagation(); startChapter(activeChapterNum); };
  document.getElementById('restartBtn').onclick = (e) => { e.stopPropagation(); startChapter(activeChapterNum); };

  fitCardHeight();
}

function fitCardHeight(){
  const flashcard = document.getElementById('flashcard');
  if(!flashcard) return;
  const frontInner = flashcard.querySelector('.face.front .face-inner');
  const backInner = flashcard.querySelector('.face.back .face-inner');
  if(!frontInner || !backInner) return;
  const facePadding = 48; // 24px top + 24px bottom, matches .face padding
  const neededHeight = Math.max(frontInner.offsetHeight, backInner.offsetHeight) + facePadding;
  flashcard.style.height = Math.max(neededHeight, 200) + 'px';
}

window.addEventListener('resize', () => { fitCardHeight(); });

function renderDone(){
  const main = document.getElementById('main');
  main.innerHTML = `
    <div class="done-state">
      <h3>Deck complete</h3>
      <p>You went through all ${deck.length} cards and marked ${knowCount} as known. Nice work.</p>
      <div class="util-row" style="margin-top:16px;">
        <button class="util-btn" id="againBtn">Go Again</button>
      </div>
    </div>
  `;
  document.getElementById('againBtn').onclick = () => startChapter(activeChapterNum);
}

function renderEmpty(){
  const main = document.getElementById('main');
  main.innerHTML = `
    <div class="empty-state">
      <h3>Pick a chapter above</h3>
      <p>Flashcards are ready for Chapter 1 and Chapter 2 so far — more chapters get added here as they're built out on the main reference.</p>
    </div>
  `;
}

renderChapterChips();
renderEmpty();
</script>

</body>
</html>
